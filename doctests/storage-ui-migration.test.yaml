name: "Migrating a Legacy Storage UI Config: Config Versioning and Forward Migration"
output: storage-ui-migration.md
release: ""

intro: |
  Previous versions of `logos-storage-ui` wrote an explicit `bootstrap-node` list
  into the user config and had no notion of a config schema version.

  The UI now versions the user config with a `config-version` field and migrates
  it on startup. This `config-version` is removed before passing the config object
  to the module.
  A config with no `config-version` is treated as version 0.
  A config already at the current version is left byte-for-byte untouched.

  This test ensures a legacy config is migrated correctly:
    1. the legacy `bootstrap-node` list is removed without adding a `network` field
    2. the Mix configuration is filled
    3. a version is added to the config

what_you_build: "Storage UI returning-user install with a legacy, unversioned config; on startup it is migrated forward — legacy bootstrap stripped, Mix defaults filled, and the config stamped with the current `config-version`."

what_you_learn:
  - How the UI versions the user config and migrates it forward from `config-version` 0 to the current version on startup
  - How to simulate a returning user (onboarding already completed) so the app loads the existing config instead of showing onboarding
  - How to drive a headless Qt/QML app with logos-qt-mcp
  - How to assert the on-disk config was migrated and stamped after the app ran

prerequisites:
  - |
    **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:

    ```bash
    mkdir -p ~/.config/nix
    echo 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf
    ```

    Verify: `nix flake --help >/dev/null 2>&1 && echo "Flakes enabled"`
  - "**A Linux machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. The legacy state is seeded through the Linux QSettings ini file (`~/.config/Logos/LogosStandalone.conf`)."
  - "**`jq`** on your `PATH` — used to assert the migrated config. Verify: `jq --version`"

sections:
  - title: "Build the qt-mcp test driver"
    step: true
    text: |
      [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the
      doc-test uses to connect to the app's QML inspector and drive it. Build it
      once and link it as `./result-mcp`.
    steps:
      - title: "Build logos-qt-mcp"
        run: "nix build 'github:logos-co/logos-qt-mcp' -o result-mcp"
        check_file: "result-mcp"

  - title: "Setup a legacy config"
    step: true
    text: |
      We simulate someone who onboarded on an old build:

      1. Reset any existing state
      2. Mark onboarding completed in settings
      3. Write legacy bootstrap list configuration
    steps:
      - title: "Reset state and write the legacy config"
        run: |
          # Fresh data dir for this run.
          rm -rf /tmp/storage-ui-migration-data
          mkdir -p /tmp/storage-ui-migration-data

          # Mark onboarding complete so the app loads the existing config
          # (returning-user path) instead of showing the wizard.
          mkdir -p "$HOME/.config/Logos"
          cat > "$HOME/.config/Logos/LogosStandalone.conf" <<'EOF'
          [Storage]
          onboardingCompleted=true
          EOF

          # Write the legacy user config: no "network", legacy "bootstrap-node".
          mkdir -p "$HOME/.logos_storage"
          cat > "$HOME/.logos_storage/config.json" <<'EOF'
          {
            "data-dir": "/tmp/storage-ui-migration-data",
            "log-level": "DEBUG",
            "listen-port": 8500,
            "disc-port": 8090,
            "nat": "none",
            "bootstrap-node": [
              "spr:CiUIAhIhA-VlcoiRm02KyIzrcTP-ljFpzTljfBRRKTIvhMIwqBqWEgIDARpJCicAJQgCEiED5WVyiJGbTYrIjOtxM_6WMWnNOWN8FFEpMi-EwjCoGpYQs8n8wQYaCwoJBHTKubmRAnU6GgsKCQR0yrm5kQJ1OipHMEUCIQDwUNsfReB4ty7JFS5WVQ6n1fcko89qVAOfQEHixa03rgIgan2-uFNDT-r4s9TOkLe9YBkCbsRWYCHGGVJ25rLj0QE",
              "spr:CiUIAhIhApIj9p6zJDRbw2NoCo-tj98Y760YbppRiEpGIE1yGaMzEgIDARpJCicAJQgCEiECkiP2nrMkNFvDY2gKj62P3xjvrRhumlGISkYgTXIZozMQvcz8wQYaCwoJBAWhF3WRAnVEGgsKCQQFoRd1kQJ1RCpGMEQCIFZB84O_nzPNuViqEGRL1vJTjHBJ-i5ZDgFL5XZxm4HAAiB8rbLHkUdFfWdiOmlencYVn0noSMRHzn4lJYoShuVzlw",
              "spr:CiUIAhIhApqRgeWRPSXocTS9RFkQmwTZRG-Cdt7UR2N7POoz606ZEgIDARpJCicAJQgCEiECmpGB5ZE9JehxNL1EWRCbBNlEb4J23tRHY3s86jPrTpkQj8_8wQYaCwoJBAXfEfiRAnVOGgsKCQQF3xH4kQJ1TipGMEQCIGWJMsF57N1iIEQgTH7IrVOgEgv0J2P2v3jvQr5Cjy-RAiAy4aiZ8QtyDvCfl_K_w6SyZ9csFGkRNTpirq_M_QNgKw"
            ]
          }
          EOF
        check_file: "/tmp/storage-ui-migration-data"

      - title: "Confirm the configuration is migrated in the config file"
        run: |
          test "$(jq 'has("network")' "$HOME/.logos_storage/config.json")" = "false"
          test "$(jq 'has("bootstrap-node")' "$HOME/.logos_storage/config.json")" = "true"
          echo "legacy config in place"

  - title: "Launch the app and let it migrate"
    step: true
    text: |
      Launch the standalone app with `nix run`. Because onboarding is already
      marked complete, the app skips the wizard, loads the config, runs the
      migration, and starts the node.
    steps:
      - title: "Launch and wait for Running"
        ui_test:
          launch: "nix run github:logos-co/logos-storage-ui{release}"
          qt_mcp: "result-mcp"
          build_timeout: 7200
          launch_timeout: 1800
          tests:
            - name: "Dashboard opens"
              action: wait_for
              texts: ["Manage node", "Total space available"]
              timeout: 60000
              text: |
                Because onboarding was already completed, the app displays the
                dashboard directly.

            - name: "Node reaches Running on the migrated config"
              action: wait_for
              texts: ["Running"]
              timeout: 60000
              screenshot: "storage-ui-migration-running.png"
              text: |
                The node starts on the migrated config and reaches Running.

  - title: "Verify the config was migrated"
    step: true
    text: |
      The app rewrote `~/.logos_storage/config.json` in place. We assert the
      legacy `bootstrap-node` is gone and that no `network` field was added — the
      module drives the network from here.

      The Mix configuration is also filled with default values when it is missing,
      to make sure that the user has a ready to use Mix setup.

      Finally the config is stamped with the current `config-version`, so a later
      startup recognises it as up to date and skips the migration.
    steps:
      - title: "The legacy bootstrap nodes were removed and the config is versioned"
        run: |
          cfg="$HOME/.logos_storage/config.json"
          echo "migrated config:"
          jq . "$cfg"

          test "$(jq 'has("bootstrap-node")' "$cfg")" = "false"
          test "$(jq 'has("network")' "$cfg")" = "false"
          test "$(jq '."config-version"' "$cfg")" = "2"

          echo "migration OK: legacy bootstrap-node removed, no network preset added, config-version stamped"

      - title: "The Mix configuration is present"
        run: |
          cfg="$HOME/.logos_storage/config.json"

          test "$(jq '."mix-enabled"' "$cfg")" = "true"
          test "$(jq '."dht-mix-proxy" | length > 0' "$cfg")" = "true"
          test "$(jq '."mix-pool-json" | length > 0' "$cfg")" = "true"

          echo "Mix config OK: mix-enabled, dht-mix-proxy, mix-pool-json"

  - title: "Restarting on the migrated config is a no-op"
    step: true
    text: |
      Restarting the app, and stopping/starting the node from the UI, should not
      affect the config after migration.
    steps:
      - title: "Snapshot the migrated config"
        run: |
          sha256sum "$HOME/.logos_storage/config.json" | awk '{print $1}' \
            > /tmp/storage-ui-migration-hash
          echo "snapshot: $(cat /tmp/storage-ui-migration-hash)"

      - title: "Relaunch, then stop and start the node"
        ui_test:
          launch: "nix run github:logos-co/logos-storage-ui{release}"
          qt_mcp: "result-mcp"
          build_timeout: 7200
          launch_timeout: 1800
          tests:
            - name: "Dashboard opens"
              action: wait_for
              texts: ["Manage node", "Total space available"]
              timeout: 60000
            - name: "Node reaches Running again"
              action: wait_for
              texts: ["Running"]
              timeout: 60000
            - name: "Stop the node"
              action: click
              target: "Stop"
            - name: "Node reports Stopped"
              action: wait_for
              texts: ["Stopped"]
              timeout: 30000
            - name: "Start the node again"
              action: click
              target: "Start"
            - name: "Node reaches Running after restart"
              action: wait_for
              texts: ["Running"]
              timeout: 30000

      - title: "The config file is unchanged"
        run: |
          cfg="$HOME/.logos_storage/config.json"
          after="$(sha256sum "$cfg" | awk '{print $1}')"
          before="$(cat /tmp/storage-ui-migration-hash)"

          test "$after" = "$before"
          test "$(jq 'has("network")' "$cfg")" = "false"
          test "$(jq 'has("bootstrap-node")' "$cfg")" = "false"
          test "$(jq '."config-version"' "$cfg")" = "2"

          echo "idempotent OK: config unchanged on restart"

  - title: "A single legacy bootstrap node is still migrated"
    step: true
    text: |
      A bootstrap node list is considered legacy if it contains only shipped defaults,
      even if it is a single node.
    steps:
      - title: "Seed a config with one legacy bootstrap node"
        run: |
          cat > "$HOME/.logos_storage/config.json" <<'EOF'
          {
            "data-dir": "/tmp/storage-ui-migration-data",
            "log-level": "DEBUG",
            "listen-port": 8500,
            "disc-port": 8090,
            "nat": "none",
            "bootstrap-node": [
              "spr:CiUIAhIhA-VlcoiRm02KyIzrcTP-ljFpzTljfBRRKTIvhMIwqBqWEgIDARpJCicAJQgCEiED5WVyiJGbTYrIjOtxM_6WMWnNOWN8FFEpMi-EwjCoGpYQs8n8wQYaCwoJBHTKubmRAnU6GgsKCQR0yrm5kQJ1OipHMEUCIQDwUNsfReB4ty7JFS5WVQ6n1fcko89qVAOfQEHixa03rgIgan2-uFNDT-r4s9TOkLe9YBkCbsRWYCHGGVJ25rLj0QE"
            ]
          }
          EOF

      - title: "Relaunch the app"
        ui_test:
          launch: "nix run github:logos-co/logos-storage-ui{release}"
          qt_mcp: "result-mcp"
          build_timeout: 7200
          launch_timeout: 1800
          tests:
            - name: "Dashboard opens"
              action: wait_for
              texts: ["Manage node", "Total space available"]
              timeout: 60000

      - title: "The single legacy bootstrap node was removed and the config is versioned"
        run: |
          cfg="$HOME/.logos_storage/config.json"

          test "$(jq 'has("bootstrap-node")' "$cfg")" = "false"
          test "$(jq 'has("network")' "$cfg")" = "false"
          test "$(jq '."config-version"' "$cfg")" = "2"

          echo "migration OK: single legacy bootstrap-node removed, config-version stamped"

  - title: "A config with custom user data is preserved and versioned"
    step: true
    text: |
      Migration must not clobber a user who set their own network and bootstrap
      list. A non-legacy `bootstrap-node` is an intentional override, so it is
      kept as-is along with the `network` field; the config is only stamped with
      the current `config-version`.
    steps:
      - title: "Seed a config with a custom network and bootstrap"
        run: |
          cat > "$HOME/.logos_storage/config.json" <<'EOF'
          {
            "data-dir": "/tmp/storage-ui-migration-data",
            "log-level": "DEBUG",
            "listen-port": 8500,
            "disc-port": 8090,
            "nat": "none",
            "network": "logos.dev",
            "bootstrap-node": [
              "spr:CiUIAhIhAn67-cPFkDpqyeTEjDPbhtN8NUxt9S-niBc5QRLyc2xrEgIDARpJCicAJQgCEiECfrv5w8WQOmrJ5MSMM9uG03w1TG31L6eIFzlBEvJzbGsQ3LWT0gYaCwoJBLKAjM6RAiOCGgsKCQSygIzOkQIjgipHMEUCIQDX2BuLjlWusHeQC-bI50ynRHSXfchFSSFfup2NFHB3dwIgLEUpNwVgcaP7Rj_GkClm3pmQ1KSqB1GeaKDbipsZJ3o"
            ],
            "mix-enabled": true,
            "dht-mix-proxy": [
              "spr:placeholder"
            ],
            "mix-pool-json": "{}"
          }
          EOF

      - title: "Relaunch the app"
        ui_test:
          launch: "nix run github:logos-co/logos-storage-ui{release}"
          qt_mcp: "result-mcp"
          build_timeout: 7200
          launch_timeout: 1800
          tests:
            - name: "Dashboard opens"
              action: wait_for
              texts: ["Manage node", "Total space available"]
              timeout: 60000

      - title: "The custom network and bootstrap are kept, the config is versioned"
        run: |
          cfg="$HOME/.logos_storage/config.json"

          test "$(jq -r '.network' "$cfg")" = "logos.dev"
          test "$(jq -r '."bootstrap-node"[0]' "$cfg")" = "spr:CiUIAhIhAn67-cPFkDpqyeTEjDPbhtN8NUxt9S-niBc5QRLyc2xrEgIDARpJCicAJQgCEiECfrv5w8WQOmrJ5MSMM9uG03w1TG31L6eIFzlBEvJzbGsQ3LWT0gYaCwoJBLKAjM6RAiOCGgsKCQSygIzOkQIjgipHMEUCIQDX2BuLjlWusHeQC-bI50ynRHSXfchFSSFfup2NFHB3dwIgLEUpNwVgcaP7Rj_GkClm3pmQ1KSqB1GeaKDbipsZJ3o"
          test "$(jq '."config-version"' "$cfg")" = "2"

          echo "preserved OK: custom network + bootstrap kept, config-version stamped"
